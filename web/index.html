<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Hello!</title>

  <body>
    <div class="container">
      <div class="inputs">

          <div><label for="file-input">Upload CSV</label></div>

        </form>

          <div><label for="search-input">Search</label></div>
          <input type="text" id="search-input" placeholder="search query" />
          <button type="submit">Search</button>
        </form>
      </div>

      <div class="calendars"></div>

      <table id="data-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </body>
  <script src="./table.js" type="module"></script>
  <script src="./forms.js" type="module"></script>
  <script src="./application.js" type="module"></script>
</html>
