version: "3.8"

services:
  web:
    build: ./web
    volumes:
      - ./web:/usr/src/app
      - /usr/src/app/node_modules
    ports:
      - 5004:8080
    depends_on:
      - node-server

  node-server:
    build: ./server
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./.env
    ports:
      - 5005:8080
    depends_on:
      - mysql-db

  mysql-db:
    image: mysql:5.7
    restart: always
    env_file:
      - ./.env
    ports:
      - "5006:3306"
    volumes:
      - ./db:/var/lib/mysql
