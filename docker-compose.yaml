version: '3.8'

services:
  web:
    build: ./web
    volumes:
      - ./web:/usr/src/app
    ports:
      - 5000:8080
    depends_on:
      - node-server

  node-server:
    build: ./server
    volumes:
      - ./server:/usr/src/app
    environment:
      - APP_PORT=8080
    ports:
      - 5001:8080
